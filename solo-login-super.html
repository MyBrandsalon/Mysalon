<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:#1A0A3A;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px}
.card{background:#24104A;border-radius:16px;padding:32px 24px;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,.4);border:1px solid rgba(124,58,237,.3)}
.logo-wrap{text-align:center;margin-bottom:24px}
.logo-box{display:inline-block;background:#F5E030;border-radius:10px;padding:10px 24px}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:32px;color:#003D2B;line-height:1;letter-spacing:2px;display:block}
.role-banner{background:linear-gradient(135deg,#4C1D95,#7C3AED);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:24px;box-shadow:0 4px 16px rgba(124,58,237,.3)}
.role-icon{font-size:28px}
.role-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;color:#fff;display:block}
.role-sub{font-size:11px;color:rgba(255,255,255,.6);margin-top:2px;display:block}
h2{font-size:22px;font-weight:800;color:#E8D5FF;margin-bottom:4px}
.sub{font-size:13px;color:#9A7ABB;margin-bottom:22px}
label{display:block;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#9A7ABB;margin-bottom:8px}
input[type="tel"],input[type="password"]{width:100%;background:#32135A;border:2px solid rgba(124,58,237,.3);border-radius:8px;padding:14px 15px;font-family:'Barlow',sans-serif;font-size:17px;font-weight:500;color:#E8D5FF;outline:none;transition:border-color .2s;-webkit-appearance:none}
input:focus{border-color:#7C3AED}
input::placeholder{color:#6A4A8A}
.fg{margin-bottom:18px}
.btn{width:100%;padding:15px;border-radius:8px;border:none;cursor:pointer;font-family:'Barlow',sans-serif;font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;transition:all .15s;display:block;text-align:center;text-decoration:none}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,#4C1D95,#7C3AED);color:#fff}
.btn-primary:hover{background:linear-gradient(135deg,#5B21B6,#8B5CF6)}
.btn-secondary{background:transparent;border:2px solid rgba(124,58,237,.3);color:#9A7ABB;margin-top:10px}
.btn-secondary:hover{border-color:#7C3AED;color:#C4B0F0}
.err{color:#F87171;font-size:13px;font-weight:600;text-align:center;margin-bottom:12px;display:none}
.warn-box{background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.3);border-radius:8px;padding:12px;text-align:center;margin-bottom:20px;font-size:12px;color:#C4B0F0;line-height:1.6}
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <div class="logo-box"><span class="logo-text">SALON PRO</span></div>
  </div>
  <div class="role-banner">
    <span class="role-icon">🛡️</span>
    <div><span class="role-title">Super Admin</span><span class="role-sub">Platform control · All salons</span></div>
  </div>
  <div class="warn-box">🔒 Restricted access — Super Admins only.<br>This portal controls all salon data.</div>
  <h2>Super Admin Login</h2>
  <p class="sub">Enter your phone and master PIN</p>
  <div id="errMsg" class="err">Invalid phone or PIN</div>
  <div class="fg">
    <label>Phone Number</label>
    <input type="tel" id="phoneInput" placeholder="10-digit phone" maxlength="10" oninput="this.value=this.value.replace(/\D/g,'')">
  </div>
  <div class="fg">
    <label>Master PIN</label>
    <input type="password" id="pinInput" placeholder="6-digit PIN" maxlength="6" inputmode="numeric" oninput="this.value=this.value.replace(/\D/g,'')">
  </div>
  <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Login →</button>
  <a href="solo-index.html" class="btn btn-secondary">← Back to Portals</a>
</div>
<script>
var SUPA_URL = 'https://sgliztuggyksdemzkaxr.supabase.co';
var SUPA_KEY = 'sb_publishable_GtdUt6IV6TcsGoyOP02oIQ_CZf0vLQy';

function doLogin(){
  var phone = document.getElementById('phoneInput').value.trim();
  var pin   = document.getElementById('pinInput').value.trim();
  var errEl = document.getElementById('errMsg');
  errEl.style.display='none';
  if(phone.length<8){errEl.textContent='Enter valid phone number';errEl.style.display='block';return;}
  if(pin.length<6){errEl.textContent='Enter 6-digit PIN';errEl.style.display='block';return;}
  var btn=document.getElementById('loginBtn');
  btn.textContent='Checking…';btn.disabled=true;
  // Check super_admins table first
  fetch(SUPA_URL+'/rest/v1/super_admins?phone=eq.'+encodeURIComponent(phone)+'&select=*',{
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'}
  }).then(function(r){return r.json();})
  .then(function(rows){
    btn.textContent='Login →';btn.disabled=false;
    if(!rows||!rows.length){
      // Fallback: check staff table with role=admin (compatibility)
      return checkStaffAdmin(phone,pin);
    }
    var sa=rows[0];
    var storedPin=String(sa.login_pin||sa.loginPin||'');
    if(storedPin!==String(pin)){
      errEl.textContent='Wrong PIN. Try again.';errEl.style.display='block';return;
    }
    sessionStorage.setItem('bb_role','super');
    sessionStorage.setItem('bb_phone',phone);
    sessionStorage.setItem('bb_name',sa.name||'Super Admin');
    sessionStorage.setItem('bb_superId',String(sa.id));
    window.location.href='solo-app-super.html';
  })
  .catch(function(err){
    btn.textContent='Login →';btn.disabled=false;
    errEl.textContent='Error: '+(err.message||err);errEl.style.display='block';
  });
}

function checkStaffAdmin(phone,pin){
  var errEl=document.getElementById('errMsg');
  fetch(SUPA_URL+'/rest/v1/staff?phone=eq.'+encodeURIComponent(phone)+'&role=eq.admin&select=*',{
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}
  }).then(function(r){return r.json();})
  .then(function(rows){
    if(!rows||!rows.length){errEl.textContent='Phone not registered as Super Admin';errEl.style.display='block';return;}
    var u=rows[0];
    var storedPin=String(u.loginPin||u.login_pin||'');
    if(storedPin!==String(pin)){errEl.textContent='Wrong PIN.';errEl.style.display='block';return;}
    sessionStorage.setItem('bb_role','super');
    sessionStorage.setItem('bb_phone',phone);
    sessionStorage.setItem('bb_name',u.name||'Super Admin');
    window.location.href='solo-app-super.html';
  }).catch(function(){errEl.textContent='Connection error';errEl.style.display='block';});
}

document.addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
