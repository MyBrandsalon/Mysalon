<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Customer Login</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5F5F0;--surface:#FFFFFF;--surface2:#F0F0EA;--border:#DDDDD5;--accent:#007A56;--accent2:#005F42;--gold:#F5E030;--white:#1A1A14;--muted:#666660;--muted2:#999990;--danger:#DC3545;--r:12px;--rs:8px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.wrap{width:100%;max-width:380px}
.header{text-align:center;margin-bottom:32px}
.logo-box{background:var(--gold);border-radius:8px;padding:8px 20px;display:inline-flex;margin-bottom:16px}
.logo-box img{max-height:40px;max-width:140px;object-fit:contain}
.logo-text-el{font-family:'Bebas Neue',sans-serif;font-size:22px;color:#003D2B;letter-spacing:2px}
.login-title{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--accent);letter-spacing:2px;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--muted);font-weight:600}
.card{background:var(--surface);border-radius:var(--r);padding:24px;border:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,.07);margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:6px}
.field input{width:100%;padding:13px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--rs);color:var(--white);font-family:'Barlow',sans-serif;font-size:16px;font-weight:600;outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--accent)}
.field input::placeholder{color:var(--muted2);font-weight:400}
#login-pin{letter-spacing:6px;font-family:monospace;font-size:22px;color:var(--accent)}
.btn-login{width:100%;padding:15px;background:var(--accent);color:var(--gold);border:none;border-radius:var(--rs);font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;cursor:pointer;transition:all .2s;margin-top:4px}
.btn-login:hover{background:var(--accent2)}
.error-msg{background:rgba(220,53,69,.08);border:1px solid rgba(220,53,69,.25);border-radius:var(--rs);padding:10px 13px;font-size:13px;color:var(--danger);font-weight:600;margin-top:12px;display:none;text-align:center}
.register-cta{background:var(--surface);border-radius:var(--r);padding:18px;border:2px solid var(--gold);text-align:center;margin-bottom:16px}
.register-cta-title{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--accent);margin-bottom:4px}
.register-cta-sub{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.5}
.btn-reg{display:block;width:100%;padding:12px;background:var(--gold);color:var(--accent2);border:none;border-radius:var(--rs);font-family:'Bebas Neue',sans-serif;font-size:18px;cursor:pointer;text-decoration:none;text-align:center}
.btn-reg:hover{background:#C8A800;color:#fff}
.back-link{text-align:center;font-size:13px;color:var(--muted)}
.back-link a{color:var(--accent);font-weight:700;text-decoration:none}
.spinner{width:38px;height:38px;border-radius:50%;border:3px solid rgba(0,122,86,.15);border-top-color:var(--accent);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(245,245,240,.85);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.loading-overlay.show{display:flex}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo-box" id="logoBox"><span class="logo-text-el" id="logoText">SALON PRO</span></div>
    <div class="login-title">Member Login</div>
    <div class="login-sub">Welcome back! Sign in to your account</div>
  </div>
  <div class="card">
    <div class="field">
      <label>Mobile Number</label>
      <input type="tel" id="login-phone" placeholder="10-digit phone" maxlength="10" inputmode="numeric" oninput="this.value=this.value.replace(/\D/g,'')">
    </div>
    <div class="field">
      <label>Login PIN</label>
      <input type="password" id="login-pin" placeholder="••••••" maxlength="6" inputmode="numeric" oninput="this.value=this.value.replace(/\D/g,'').slice(0,6)" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-login" onclick="doLogin()">LOGIN →</button>
    <div class="error-msg" id="login-error"></div>
  </div>
  <div class="register-cta">
    <div class="register-cta-title">✂️ New Customer?</div>
    <div class="register-cta-sub">Join and unlock exclusive discounts,<br>style cards, and your visit history.</div>
    <a href="solo-register-customer.html" class="btn-reg">JOIN AS MEMBER →</a>
  </div>
  <div class="back-link"><a href="solo-index.html">← Back to Home</a></div>
</div>
<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div><div style="font-size:13px;color:var(--accent);font-weight:700">Signing you in…</div></div>

<script>
var SUPA_URL = 'https://socgmrzzovpqaekpsklv.supabase.co';
var SUPA_KEY = 'sb_publishable_l48tcr0wuHPZCrMuDtj-pQ_dXZtgyrj';

// Apply branding
(function loadBranding(){
  fetch(SUPA_URL+'/rest/v1/salon_branding?select=*&limit=1',{headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}})
    .then(function(r){return r.json();})
    .then(function(rows){
      if(rows&&rows[0]){
        var b=rows[0];
        if(b.logo_url) document.getElementById('logoBox').innerHTML='<img src="'+b.logo_url+'" alt="Logo" style="max-height:40px;max-width:140px;object-fit:contain">';
        else if(b.salon_name) document.getElementById('logoText').textContent=b.salon_name;
        if(b.primary_color) document.querySelector('.btn-login').style.background=b.primary_color;
        document.title=(b.salon_name||'Salon Pro')+' — Member Login';
      }
    }).catch(function(){});
})();

function doLogin(){
  var phone=document.getElementById('login-phone').value.trim();
  var pin=document.getElementById('login-pin').value.trim();
  var errEl=document.getElementById('login-error');
  errEl.style.display='none';
  if(phone.length<10){showError('Enter a valid 10-digit phone number');return;}
  if(!pin||pin.length<6){showError('Enter your 6-digit PIN');return;}
  document.getElementById('loadingOverlay').classList.add('show');
  fetch(SUPA_URL+'/rest/v1/customers?phone=eq.'+encodeURIComponent(phone)+'&select=*',{
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}
  }).then(function(r){return r.ok?r.json():[];})
  .then(function(customers){
    document.getElementById('loadingOverlay').classList.remove('show');
    var c=customers&&customers[0];
    if(!c){showError('Phone not registered. Please join as a member first.');return;}
    var storedPin=String(c.loginPin||c.login_pin||'');
    if(storedPin!==String(pin)){showError('Incorrect PIN. Please try again.');return;}
    sessionStorage.setItem('bb_phone',c.phone);
    sessionStorage.setItem('bb_role','customer');
    sessionStorage.setItem('bb_customerId',c.id);
    window.location.href='solo-app-customer.html';
  }).catch(function(){
    document.getElementById('loadingOverlay').classList.remove('show');
    showError('Connection error. Please try again.');
  });
}
function showError(msg){var el=document.getElementById('login-error');el.textContent=msg;el.style.display='block';}
</script>
</body>
</html>
