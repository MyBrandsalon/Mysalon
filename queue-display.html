<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MySalon – Queue Display</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#007A56;--gold:#F5E030;--gold-dark:#C8A800;
  --bg:#0D1F18;--surface:#122B1F;--surface2:#1A3828;--border:#244D38;
  --white:#F0F5F2;--muted:#8FADA0;--muted2:#5A7A6E;
  --danger:#E05050;--green:#3DD68C;--warn:#F5A623;
  --BF:'Barlow',sans-serif;--HF:'Bebas Neue',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--white);font-family:var(--BF)}

/* ── LAYOUT ── */
.layout{display:grid;grid-template-rows:auto 1fr auto;height:100vh;padding:24px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.main{display:grid;grid-template-columns:1fr 1fr;gap:20px;min-height:0}
.footer{margin-top:20px;display:flex;align-items:center;justify-content:space-between}

/* ── HEADER ── */
.logo-box{background:var(--gold);border-radius:8px;padding:4px 14px;display:inline-flex;align-items:center}
.logo-box span{font-family:var(--HF);font-size:22px;color:#003D2B;letter-spacing:1px;line-height:1}
.salon-title{font-family:var(--HF);font-size:28px;color:var(--white);letter-spacing:2px;margin-left:16px}
.clock{font-family:var(--HF);font-size:32px;color:var(--gold);letter-spacing:2px}

/* ── NOW SERVING ── */
.now-serving{background:var(--surface);border:2px solid var(--accent);border-radius:16px;padding:28px;display:flex;flex-direction:column;justify-content:center}
.ns-label{font-size:11px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.ns-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:blink 1.4s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.ns-token{font-family:var(--HF);font-size:110px;color:var(--gold);letter-spacing:6px;line-height:1;margin-bottom:8px}
.ns-name{font-size:22px;font-weight:800;color:var(--white);margin-bottom:6px}
.ns-meta{font-size:14px;color:var(--muted);line-height:1.6}
.ns-offer{display:inline-block;background:rgba(245,224,48,.1);border:1px solid rgba(245,224,48,.3);color:var(--gold);font-size:13px;font-weight:700;padding:4px 12px;border-radius:20px;margin-top:10px}
.ns-empty{text-align:center;padding:40px 0}
.ns-empty-icon{font-size:64px;opacity:.2;margin-bottom:12px}
.ns-empty-txt{font-size:16px;color:var(--muted2)}

/* ── QUEUE LIST ── */
.queue-list{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;display:flex;flex-direction:column;gap:0;overflow:hidden}
.ql-header{font-size:11px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:16px}
.ql-item{display:grid;grid-template-columns:56px 1fr auto;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.ql-item:last-child{border-bottom:none}
.ql-pos{font-family:var(--HF);font-size:28px;color:var(--muted2);text-align:center;line-height:1}
.ql-pos.first{color:var(--gold)}
.ql-name{font-size:15px;font-weight:800;color:var(--white)}
.ql-svc{font-size:12px;color:var(--muted);margin-top:2px}
.ql-eta{text-align:right}
.ql-eta-val{font-family:var(--HF);font-size:20px;color:var(--accent);line-height:1}
.ql-eta-lbl{font-size:10px;color:var(--muted2);margin-top:2px}
.ql-empty{text-align:center;padding:32px 0;color:var(--muted2);font-size:14px}
.ql-offer-pill{font-size:10px;font-weight:700;background:rgba(245,224,48,.08);color:var(--gold);border:1px solid rgba(245,224,48,.2);padding:2px 7px;border-radius:10px;margin-top:3px;display:inline-block}

/* ── STATS FOOTER ── */
.stat-strip{display:flex;gap:24px;align-items:center}
.ss-item{text-align:center}
.ss-val{font-family:var(--HF);font-size:28px;color:var(--white);letter-spacing:.5px;line-height:1}
.ss-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted2);margin-top:2px}
.ss-sep{width:1px;height:36px;background:var(--border)}

.qr-hint{font-size:11px;color:var(--muted2);text-align:right;line-height:1.5}
.qr-url{color:var(--accent);font-weight:700;font-size:12px}
.pulse-ring{display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--green);margin-right:6px;animation:blink 1.4s infinite}
.updated{font-size:11px;color:var(--muted2);display:flex;align-items:center}

/* ── BB Topbar Logo ── */
.bb-logo-sm{display:inline-block;background:#003D2B;border-radius:5px;overflow:hidden;border:2px solid #C8A800;flex-shrink:0;text-decoration:none;line-height:0}
.bb-logo-sm-top{display:block;background:#C8A800;font-family:'Bebas Neue',sans-serif;font-size:11px;color:#003D2B;letter-spacing:1.5px;line-height:1;padding:2px 6px 1px;text-align:center}
.bb-logo-sm-div{display:block;background:#003D2B;height:1px}
.bb-logo-sm-bot{display:block;background:#003D2B;font-family:'Bebas Neue',sans-serif;font-size:11px;color:#C8A800;letter-spacing:1.5px;line-height:1;padding:1px 6px 2px;text-align:center}

/* ── BB Logo ── */
.logo-wrap{text-align:center;margin-bottom:24px}
.bb-logo{display:inline-block;background:#003D2B;border-radius:10px;overflow:hidden;border:3px solid #C8A800;text-decoration:none}
.bb-logo-top{display:block;background:#C8A800;font-family:'Bebas Neue',sans-serif;font-size:36px;color:#003D2B;letter-spacing:3px;line-height:1;padding:7px 28px 3px;text-align:center}
.bb-logo-bot{display:block;background:#003D2B;font-family:'Bebas Neue',sans-serif;font-size:36px;color:#C8A800;letter-spacing:3px;line-height:1;padding:3px 28px 7px;text-align:center}
.bb-logo-tag{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:#003D2B;margin-top:7px;display:block}

</style>
</head>
<body>

<div class="layout">
  <!-- Header -->
  <div class="header">
    <div style="display:flex;align-items:center">
      <div class="bb-logo-sm">
    <span class="bb-logo-sm-top">MY</span>
    <span class="bb-logo-sm-div"></span>
    <span class="bb-logo-sm-bot">SALON</span>
  </div>
      <div class="salon-title" id="salon-title">MY SALON</div>
    </div>
    <div style="display:flex;align-items:center;gap:24px">
      <div class="updated"><span class="pulse-ring"></span><span id="last-updated">Live</span></div>
      <div class="clock" id="clock">00:00</div>
    </div>
  </div>

  <!-- Main: Now Serving + Queue -->
  <div class="main">
    <!-- Now Serving -->
    <div class="now-serving" id="now-serving-panel">
      <div class="ns-label"><span class="ns-dot"></span> NOW SERVING</div>
      <div id="ns-content">
        <div class="ns-empty">
          <div class="ns-empty-icon">✂️</div>
          <div class="ns-empty-txt">No one being served yet</div>
        </div>
      </div>
    </div>

    <!-- Queue List -->
    <div class="queue-list">
      <div class="ql-header">NEXT UP — WAITING QUEUE</div>
      <div id="queue-list-content">
        <div class="ql-empty">Queue is empty · Scan QR to join</div>
      </div>
    </div>
  </div>

  <!-- Footer Stats -->
  <div class="footer">
    <div class="stat-strip">
      <div class="ss-item">
        <div class="ss-val" id="stat-waiting">0</div>
        <div class="ss-lbl">Waiting</div>
      </div>
      <div class="ss-sep"></div>
      <div class="ss-item">
        <div class="ss-val" id="stat-served">0</div>
        <div class="ss-lbl">Served Today</div>
      </div>
      <div class="ss-sep"></div>
      <div class="ss-item">
        <div class="ss-val" id="stat-avg">–</div>
        <div class="ss-lbl">Avg Wait</div>
      </div>
    </div>
    <div class="qr-hint">
      Scan to join queue<br>
      <span class="qr-url" id="qr-url">budgetbarber.github.io/queue-join</span>
    </div>
  </div>
</div>

<script>
var SUPA_URL = 'https://sgliztuggyksdemzkaxr.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNnbGl6dHVnZ3lrc2RlbXprYXhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODc5MjMsImV4cCI6MjA5Mzg2MzkyM30.RE6j94oiI2ycLO0qj9WpYdn9Vg_5bF5jG6PQoP3huQk';
var salonId  = new URLSearchParams(location.search).get('salon') || '';
var ws = null;

function _h(){return{'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY};}
function _get(p){return fetch(SUPA_URL+'/rest/v1/'+p,{headers:_h()}).then(function(r){return r.json();});}

function todayStr(){return new Date().toLocaleDateString('en-IN');}

function clockTick(){
  var now=new Date();
  var h=now.getHours(),m=now.getMinutes();
  var ampm=h>=12?'PM':'AM';
  h=h%12||12;
  document.getElementById('clock').textContent=(h<10?'0':'')+h+':'+(m<10?'0':'')+m+' '+ampm;
}
setInterval(clockTick,1000);clockTick();

function loadSalon(){
  if(!salonId) return;
  _get('salons?id=eq.'+encodeURIComponent(salonId)+'&select=name').then(function(rows){
    if(rows&&rows.length) document.getElementById('salon-title').textContent=(rows[0].name||'MySalon').toUpperCase();
  }).catch(function(){});
}

function loadQueue(){
  if(!salonId) return;
  Promise.all([
    _get('queue_tokens?salon_id=eq.'+encodeURIComponent(salonId)+'&date=eq.'+encodeURIComponent(todayStr())+'&status=eq.in_chair&order=start_time.asc&select=*&limit=3'),
    _get('queue_tokens?salon_id=eq.'+encodeURIComponent(salonId)+'&date=eq.'+encodeURIComponent(todayStr())+'&status=eq.waiting&order=position.asc&select=*&limit=6'),
    _get('queue_tokens?salon_id=eq.'+encodeURIComponent(salonId)+'&date=eq.'+encodeURIComponent(todayStr())+'&status=eq.done&select=id,served_time'),
    _get('staff?salonId=eq.'+encodeURIComponent(salonId)+'&role=eq.barber&select=id,name')
  ]).then(function(res){
    var inChair=res[0]||[]; var waiting=res[1]||[]; var done=res[2]||[]; var staff=res[3]||[];
    var staffMap={};staff.forEach(function(s){staffMap[s.id]=s.name;});
    renderNowServing(inChair,staffMap);
    renderQueueList(waiting,staffMap);
    renderStats(waiting.length,done.length,waiting);
    document.getElementById('last-updated').textContent='Updated '+new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  }).catch(function(e){console.warn(e);});
}

function renderNowServing(tokens,staffMap){
  var el=document.getElementById('ns-content');
  if(!tokens.length){
    el.innerHTML='<div class="ns-empty"><div class="ns-empty-icon">✂️</div><div class="ns-empty-txt">No one being served yet</div></div>';
    return;
  }
  el.innerHTML=tokens.map(function(t){
    var stylistName=t.barber_id?(staffMap[t.barber_id]||'Stylist'):'Any Stylist';
    var elapsed=t.start_time?Math.floor((Date.now()-new Date(t.start_time).getTime())/60000):0;
    return '<div style="margin-bottom:'+(tokens.length>1?'20px':'0')+'">'+
      '<div class="ns-token">'+t.token_number+'</div>'+
      '<div class="ns-name">'+(t.customer_name||'Guest')+'</div>'+
      '<div class="ns-meta">'+stylistName+' &nbsp;·&nbsp; '+(t.services||'Service')+' &nbsp;·&nbsp; '+elapsed+' min elapsed</div>'+
      (t.offer_pct>0?'<div class="ns-offer">'+t.offer_pct+'% OFF — '+(t.offer_name||'Offer')+'</div>':'')+
    '</div>';
  }).join('<hr style="border-color:var(--border);margin:12px 0">');
}

function renderQueueList(tokens,staffMap){
  var el=document.getElementById('queue-list-content');
  if(!tokens.length){
    el.innerHTML='<div class="ql-empty">Queue is empty · Scan QR to join</div>';
    return;
  }
  el.innerHTML=tokens.map(function(t,i){
    var stylistName=t.barber_id?(staffMap[t.barber_id]||'?'):'Any';
    var eta=t.eta_minutes||0;
    return '<div class="ql-item">'+
      '<div class="ql-pos'+(i===0?' first':'')+'">'+t.token_number.replace('B-','')+'</div>'+
      '<div>'+
        '<div class="ql-name">'+(t.customer_name||'Guest')+'</div>'+
        '<div class="ql-svc">'+(t.services||'Service')+' &nbsp;·&nbsp; '+stylistName+'</div>'+
        (t.offer_pct>0?'<div class="ql-offer-pill">'+t.offer_pct+'% OFF</div>':'')+
      '</div>'+
      '<div class="ql-eta">'+
        '<div class="ql-eta-val">'+(eta>0?eta+'m':'–')+'</div>'+
        '<div class="ql-eta-lbl">wait</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

function renderStats(waiting,served,tokens){
  document.getElementById('stat-waiting').textContent=waiting;
  document.getElementById('stat-served').textContent=served;
  if(tokens.length>0){
    var avg=Math.round(tokens.reduce(function(a,t){return a+(t.eta_minutes||0);},0)/tokens.length);
    document.getElementById('stat-avg').textContent=avg+'m';
  } else {
    document.getElementById('stat-avg').textContent='–';
  }
}

function startRealtime(){
  if(!salonId||typeof WebSocket==='undefined') return;
  try{
    var url=SUPA_URL.replace('https://','wss://')+'/realtime/v1/websocket?apikey='+SUPA_KEY+'&vsn=1.0.0';
    ws=new WebSocket(url);
    ws.onopen=function(){
      ws.send(JSON.stringify({topic:'realtime:public:queue_tokens',event:'phx_join',payload:{config:{broadcast:{self:true},presence:{key:''}}},ref:'1'}));
    };
    ws.onmessage=function(e){
      try{
        var msg=JSON.parse(e.data);
        if(msg.event==='postgres_changes') loadQueue();
      }catch(ex){}
    };
    ws.onclose=function(){setTimeout(startRealtime,5000);};
    ws.onerror=function(){};
  }catch(ex){}
}

loadSalon();
loadQueue();
startRealtime();
setInterval(loadQueue,10000);
</script>
</body>
</html>
