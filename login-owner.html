<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>MySalon – Owner / Manager Login</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Barlow',sans-serif;background:#F0F0EA;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px}
.wrap{width:100%;max-width:380px}

/* ── Logo floats above card ── */
.logo-section{text-align:center;margin-bottom:20px}
.salon-logo-img{width:100px;height:100px;border-radius:18px;object-fit:contain;display:block;box-shadow:0 4px 20px rgba(0,0,0,.18);margin:0 auto 10px}
.ms-logo-badge{display:inline-block;background:#003D2B;border-radius:10px;overflow:hidden;border:3px solid #C8A800;margin-bottom:8px}
.ms-logo-badge-top{display:block;background:#C8A800;font-family:'Bebas Neue',sans-serif;font-size:32px;color:#003D2B;letter-spacing:2px;line-height:1;padding:6px 22px 2px;text-align:center}
.ms-logo-badge-bot{display:block;background:#003D2B;font-family:'Bebas Neue',sans-serif;font-size:18px;color:#C8A800;letter-spacing:3px;line-height:1;padding:2px 22px 6px;text-align:center}
.platform-tag{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:#888;margin-top:4px;display:block}
.salon-name-tag{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;color:#003D2B;letter-spacing:1px;text-transform:uppercase;margin-top:6px;display:block}

/* ── Card ── */
.card{background:white;border-radius:16px;padding:28px 22px;box-shadow:0 4px 24px rgba(0,0,0,.10);border:1px solid #E0E0D8}
.role-banner{background:#7c2d12;color:#F5E030;border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:22px}
.role-icon{font-size:24px}
.role-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;display:block}
.role-sub{font-size:11px;color:rgba(245,224,48,.65);margin-top:2px;display:block}
h2{font-size:22px;font-weight:800;color:#1A1A14;margin-bottom:4px}
.sub{font-size:13px;color:#767668;margin-bottom:20px}
label{display:block;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#767668;margin-bottom:7px}
input[type=tel],input[type=password]{width:100%;background:#F8F8F4;border:2px solid #E0E0D8;border-radius:8px;padding:14px 15px;font-family:'Barlow',sans-serif;font-size:17px;font-weight:500;color:#1A1A14;outline:none;transition:border-color .2s;-webkit-appearance:none}
input:focus{border-color:#7c2d12}
input::placeholder{color:#AAAAAA}
.fg{margin-bottom:16px}
.btn{width:100%;padding:15px;border-radius:8px;border:none;cursor:pointer;font-family:'Barlow',sans-serif;font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;transition:all .15s;display:block;text-align:center;text-decoration:none}
.btn:active{transform:scale(.97)}
.btn-primary{background:#7c2d12;color:#F5E030}
.btn-primary:disabled{background:#ccc;color:#888;cursor:not-allowed}
.btn-secondary{background:transparent;border:2px solid #E0E0D8;color:#767668;margin-top:10px}
.btn-secondary:hover{border-color:#003D2B;color:#003D2B}
.err{color:#DC2626;font-size:13px;font-weight:600;text-align:center;margin-bottom:12px;display:none;background:rgba(220,38,38,.06);padding:10px;border-radius:8px;border:1px solid rgba(220,38,38,.2)}
</style>
</head>
<body>
<div class="wrap">

  <!-- Logo area — floats above the white card, no box around it -->
  <div class="logo-section">
    <!-- Single logo img — shows default MySalon logo, replaced by tenant logo on load -->
    <img id="salonLogoImg" class="salon-logo-img"
         src="ms-default-logo.svg"
         alt="MySalon"
         onerror="this.src='ms-default-logo.svg'">
    <span id="platformTag" class="platform-tag">Digital Salon Platform</span>
    <span class="salon-name-tag ms-salon-name">Loading…</span>
  </div>

  <!-- Login card -->
  <div class="card">
    <div class="role-banner">
      <span class="role-icon">🏪</span>
      <div><span class="role-title">Owner / Manager Login</span><span class="role-sub">Full salon management access</span></div>
    </div>
    <h2>Owner / Manager Login</h2>
    <p class="sub">Enter your phone number and 6-digit PIN</p>
    <div id="errMsg" class="err"></div>
    <div class="fg"><label>Mobile Number</label><input type="tel" id="phoneInput" placeholder="10-digit mobile number" maxlength="10" oninput="this.value=this.value.replace(/\D/g,'')"></div>
    <div class="fg"><label>PIN</label><input type="password" id="pinInput" placeholder="6-digit PIN" maxlength="6" inputmode="numeric" oninput="this.value=this.value.replace(/\D/g,'')"></div>
    <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Login →</button>
    <a href="#" onclick="goPortal()" class="btn btn-secondary">← Back to Portals</a>
  </div>

</div>
<script>
var MS_URL='https://sgliztuggyksdemzkaxr.supabase.co';
var MS_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNnbGl6dHVnZ3lrc2RlbXprYXhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODc5MjMsImV4cCI6MjA5Mzg2MzkyM30.RE6j94oiI2ycLO0qj9WpYdn9Vg_5bF5jG6PQoP3huQk';
var _slug=new URLSearchParams(location.search).get('salon')||sessionStorage.getItem('ms_slug')||'';
var _tenant=null;
function _h(){return{'Content-Type':'application/json','apikey':MS_KEY,'Authorization':'Bearer '+MS_KEY};}
function _get(p){return fetch(MS_URL+'/rest/v1/'+p,{headers:_h()}).then(function(r){return r.ok?r.json():[];});}
function _post(p,b){return fetch(MS_URL+'/rest/v1/'+p,{method:'POST',headers:Object.assign(_h(),{'Prefer':'return=representation'}),body:JSON.stringify(b)}).then(function(r){return r.ok?r.json():r.text().then(function(t){throw new Error(t);});}).then(function(r){return Array.isArray(r)?r[0]:r;});}
(function init(){
  if(!_slug){showErr('No salon ID.');return;}
  sessionStorage.setItem('ms_slug',_slug);
  document.getElementById('loginBtn').disabled=true;
  document.getElementById('loginBtn').textContent='⏳ Loading…';
  _get('tenants?slug=eq.'+encodeURIComponent(_slug)+'&is_active=eq.true&select=id,name,logo_url,plan,owner_phone,owner_pin')
    .then(function(rows){
      if(!rows||!rows.length){showErr('Salon not found.');return;}
      _tenant=rows[0];
      document.querySelectorAll('.ms-salon-name').forEach(function(el){el.textContent=_tenant.name;});
  // ── Apply tenant logo (replaces default MySalon logo) ──────
  var _logoImg = document.getElementById('salonLogoImg');
  var _logoTag = document.getElementById('platformTag');
  var _logoUrl = (_tenant.logo_url || '').trim();
  if(_logoUrl && _logoImg){
    _logoImg.onload = function(){
      _logoImg.src = _logoUrl;
      if(_logoTag) _logoTag.style.display = 'none';
    };
    _logoImg.onerror = function(){
      _logoImg.src = 'ms-default-logo.svg';
      if(_logoTag) _logoTag.style.display = 'block';
    };
    _logoImg.src = _logoUrl;
  }
  // ────────────────────────────────────────────────────────────
      document.title=_tenant.name+' – Owner / Manager Login';
      // Apply salon logo if uploaded
      if(_tenant.logo_url){
        var _img = document.getElementById('salonLogoImg');
        var _fb  = document.getElementById('logoFallback');
        if(_img){
          _img.src = _tenant.logo_url;
          _img.style.display = 'block';
          _img.onerror = function(){ _img.style.display='none'; if(_fb) _fb.style.display='block'; };
          if(_fb) _fb.style.display = 'none';
        }
      }
      sessionStorage.setItem('ms_tenant_id',_tenant.id);
      sessionStorage.setItem('ms_plan',_tenant.plan||'free');
      sessionStorage.setItem('ms_name',_tenant.name);
      var _lu=(_tenant.logo_url||'').trim();if(_lu){sessionStorage.setItem('ms_logo',_lu);localStorage.setItem('ms_logo',_lu);}
      document.getElementById('loginBtn').disabled=false;
      document.getElementById('loginBtn').textContent='Login →';
    }).catch(function(){showErr('Failed to load.');document.getElementById('loginBtn').disabled=false;document.getElementById('loginBtn').textContent='Login →';});
})();
function doLogin(){
  var phone=document.getElementById('phoneInput').value.trim();
  var pin=document.getElementById('pinInput').value.trim();
  hideErr();
  if(phone.length<10){showErr('Enter valid 10-digit phone.');return;}
  if(pin.length<6){showErr('Enter your 6-digit PIN.');return;}
  if(!_tenant){showErr('Salon data not loaded.');return;}
  // Check owner credentials first
  if(String(_tenant.owner_phone)===phone && String(_tenant.owner_pin)===pin){
    setSession('owner',phone,_tenant.owner_name||'Owner',null,null);
    try{localStorage.setItem('ms_role',role||'owner');localStorage.setItem('ms_phone',phone);localStorage.setItem('ms_slug',_slug);localStorage.setItem('ms_tenant_id',_tenant?_tenant.id:'');}catch(e){}
window.location.href='app-owner.html?salon='+encodeURIComponent(_slug);
    return;
  }
  // Fallback: manager-role staff
  _get('staff?tenant_id=eq.'+encodeURIComponent(_tenant.id)+'&phone=eq.'+encodeURIComponent(phone)+'&role=in.(manager,admin)&active=eq.true&select=id,name,login_pin,loginPin,salon_id,salonId')
    .then(function(rows){
      if(!rows||!rows.length){showErr('Phone or PIN not recognised.');return;}
      var sm=rows[0];var lp=String(sm.loginPin||sm.login_pin||'');
      if(lp!==pin){showErr('Wrong PIN.');document.getElementById('pinInput').value='';return;}
      setSession('manager',phone,sm.name||'Manager',String(sm.id),String(sm.salonId||sm.salon_id||''));
      try{localStorage.setItem('ms_role',role||'owner');localStorage.setItem('ms_phone',phone);localStorage.setItem('ms_slug',_slug);localStorage.setItem('ms_tenant_id',_tenant?_tenant.id:'');}catch(e){}
window.location.href='app-owner.html?salon='+encodeURIComponent(_slug);
    }).catch(function(){showErr('Login failed.');});
}
function setSession(role,phone,name,staffId,salonId){
  // Write to BOTH storages so navigation works regardless of browser behaviour
  var keys = {
    ms_role: role,
    ms_phone: phone,
    ms_user_name: name||role,
    ms_staff_id: staffId||'',
    ms_salon_id: salonId||'',
    ms_slug: _slug,
    ms_tenant_id: _tenant ? _tenant.id : (sessionStorage.getItem('ms_tenant_id')||''),
    ms_plan: _tenant ? (_tenant.plan||'free') : (sessionStorage.getItem('ms_plan')||'free'),
    ms_name: _tenant ? _tenant.name : (sessionStorage.getItem('ms_name')||'')
  };
  Object.keys(keys).forEach(function(k){
    try { sessionStorage.setItem(k, keys[k]); } catch(e){}
    try { localStorage.setItem(k, keys[k]); } catch(e){}
  });
}
function showErr(m){var e=document.getElementById('errMsg');e.textContent=m;e.style.display='block';}
function hideErr(){document.getElementById('errMsg').style.display='none';}
document.addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
function goPortal(){ var s=_slug||localStorage.getItem('ms_slug')||'';
  window.location.href='salon-portal.html'+(s?'?salon='+encodeURIComponent(s):''); }
</script>
</body>
</html>
