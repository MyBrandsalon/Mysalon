<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salon — Choose Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:#F0F4F2;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px 40px}
.logo-box{background:var(--gold,#F5E030);border-radius:10px;padding:12px 28px;text-align:center;margin-bottom:6px;display:inline-block;box-shadow:0 4px 16px rgba(0,61,43,0.15)}
.logo-img{max-height:60px;max-width:180px;object-fit:contain}
.logo-top{font-family:'Bebas Neue',sans-serif;font-size:48px;color:#003D2B;line-height:1;letter-spacing:2px;display:block}
.logo-divider{background:#003D2B;height:3px;margin:4px -28px}
.logo-bottom{font-family:'Bebas Neue',sans-serif;font-size:48px;color:#003D2B;line-height:1;letter-spacing:2px;display:block}
.tagline{font-size:12px;font-weight:700;letter-spacing:3px;color:#5A7A6A;text-transform:uppercase;margin-top:14px;margin-bottom:32px;text-align:center}
h1{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:#1A2E25;text-align:center;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.subtitle{font-size:13px;color:#7A9A8A;text-align:center;margin-bottom:28px}
.portal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:340px;margin-bottom:16px}
.portal-btn{background:#fff;border:1.5px solid #D8E8DF;border-radius:12px;padding:22px 12px 18px;text-align:center;cursor:pointer;text-decoration:none;display:block;transition:all .2s;box-shadow:0 2px 8px rgba(0,61,43,.06)}
.portal-btn:hover{background:#EBF5EF;border-color:#00C48C;transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,196,140,.15)}
.portal-btn:active{transform:scale(.97)}
.portal-icon{font-size:34px;display:block;margin-bottom:10px}
.portal-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;color:#003D2B;text-transform:uppercase;letter-spacing:1px;display:block}
.portal-desc{font-size:11px;color:#7A9A8A;margin-top:4px;display:block}
.portal-btn.super-btn{grid-column:1/-1;display:flex;align-items:center;justify-content:center;gap:14px;padding:14px 20px;background:#F0EBFF;border-color:#C4B0F0}
.portal-btn.super-btn:hover{background:#E4D9FF;border-color:#7C3AED}
.portal-btn.super-btn .portal-icon{font-size:26px;margin:0}
.portal-btn.super-btn .portal-name{color:#4C1D95}
.portal-btn.super-btn .portal-desc{color:#7C5AC0}
.footer-note{font-size:11px;color:#9AB5A5;text-align:center;margin-top:20px}
</style>
</head>
<body>
<div class="logo-box" id="logoBox">
  <span class="logo-top" id="logoTop">SALON</span>
  <div class="logo-divider" id="logoDivider"></div>
  <span class="logo-bottom" id="logoBottom">PRO</span>
</div>
<div class="tagline" id="taglineEl">Your Digital Salon</div>

<h1>Choose Your Portal</h1>
<div class="subtitle">Select who you are to continue</div>

<div class="portal-grid">
  <a href="solo-login-customer.html" class="portal-btn">
    <span class="portal-icon">👤</span>
    <span class="portal-name">Customer</span>
    <span class="portal-desc">Style cards & history</span>
  </a>
  <a href="solo-login-stylist.html" class="portal-btn">
    <span class="portal-icon">✂️</span>
    <span class="portal-name">Hairstylist</span>
    <span class="portal-desc">Log sales & styles</span>
  </a>
  <a href="solo-login-owner.html" class="portal-btn" style="grid-column:1/-1;display:flex;align-items:center;gap:14px;padding:14px 20px;background:#EFF8F3;border-color:#A8D5B5">
    <span class="portal-icon" style="font-size:26px;margin:0">🏪</span>
    <div style="text-align:left">
      <span class="portal-name" style="color:#006644">Salon Owner</span>
      <span class="portal-desc" style="color:#4A9A6A">Dashboard, analytics & full control</span>
    </div>
  </a>
  <a href="solo-login-super.html" class="portal-btn super-btn">
    <span class="portal-icon">🛡️</span>
    <div style="text-align:left">
      <span class="portal-name">Super Admin</span>
      <span class="portal-desc">Platform control · All salons</span>
    </div>
  </a>
</div>

<div class="footer-note" id="footerNote">© 2026 Salon Pro</div>

<script>
var SUPA_URL = 'https://sgliztuggyksdemzkaxr.supabase.co';
var SUPA_KEY = 'sb_publishable_GtdUt6IV6TcsGoyOP02oIQ_CZf0vLQy';

// Load branding for the default/only salon
(function loadBranding(){
  // Try to get salon ID from URL param ?salon=xxx or localStorage
  var params = new URLSearchParams(window.location.search);
  var salonId = params.get('salon') || localStorage.getItem('solo_salonId') || '';
  if(!salonId){
    // Fetch first salon
    fetch(SUPA_URL+'/rest/v1/salons?limit=1&select=id,name',{headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}})
      .then(function(r){return r.json();})
      .then(function(salons){
        if(salons&&salons[0]){
          localStorage.setItem('solo_salonId', salons[0].id);
          salonId = salons[0].id;
          fetchBranding(salonId);
        }
      }).catch(function(){});
    return;
  }
  fetchBranding(salonId);
})();

function fetchBranding(salonId){
  fetch(SUPA_URL+'/rest/v1/salon_branding?salon_id=eq.'+encodeURIComponent(salonId)+'&select=*',{
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}
  }).then(function(r){return r.json();})
  .then(function(rows){
    if(rows&&rows[0]) applyBranding(rows[0]);
    else {
      // Fallback: use salon name
      fetch(SUPA_URL+'/rest/v1/salons?id=eq.'+encodeURIComponent(salonId)+'&select=name',{headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}})
        .then(function(r){return r.json();})
        .then(function(s){if(s&&s[0]&&s[0].name) setLogoText(s[0].name);}).catch(function(){});
    }
  }).catch(function(){});
}

function applyBranding(b){
  if(b.logo_url){
    var box = document.getElementById('logoBox');
    box.innerHTML = '<img class="logo-img" src="'+b.logo_url+'" alt="'+( b.salon_name||'Salon')+'">';
  } else if(b.salon_name){
    setLogoText(b.salon_name);
  }
  if(b.tagline) document.getElementById('taglineEl').textContent = b.tagline;
  if(b.primary_color){
    document.documentElement.style.setProperty('--accent', b.primary_color);
    document.querySelectorAll('.portal-btn.portal-owner').forEach(function(el){el.style.borderColor=b.primary_color;});
  }
  document.getElementById('footerNote').textContent = '© 2026 '+(b.salon_name||'Salon Pro');
  document.title = (b.salon_name||'Salon Pro')+' — Choose Portal';
}

function setLogoText(name){
  var parts = name.split(' ');
  var top = parts[0]||'SALON';
  var bottom = parts.slice(1).join(' ')||'PRO';
  document.getElementById('logoTop').textContent = top;
  document.getElementById('logoBottom').textContent = bottom;
  document.getElementById('logoDivider').style.display = bottom ? 'block' : 'none';
  document.title = name + ' — Choose Portal';
}
</script>
</body>
</html>
