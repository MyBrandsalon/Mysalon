<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>MySalon – Customer Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Barlow',sans-serif;background:#F0F0EA;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px}
.wrap{width:100%;max-width:380px}
.logo-section{text-align:center;margin-bottom:20px}
.salon-logo-img{width:100px;height:100px;border-radius:18px;object-fit:contain;display:block;box-shadow:0 4px 20px rgba(0,0,0,.18);margin:0 auto 10px}
.platform-tag{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:#888;margin-top:4px;display:block}
.salon-name-tag{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;color:#003D2B;letter-spacing:1px;text-transform:uppercase;margin-top:6px;display:block}
.card{background:white;border-radius:16px;padding:28px 22px;box-shadow:0 4px 24px rgba(0,0,0,.10);border:1px solid #E0E0D8}
.role-banner{background:#003D2B;color:#F5E030;border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:22px}
.role-icon{font-size:24px}
.role-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;display:block}
.role-sub{font-size:11px;color:rgba(245,224,48,.65);margin-top:2px;display:block}
h2{font-size:22px;font-weight:800;color:#1A1A14;margin-bottom:4px}
.sub{font-size:13px;color:#767668;margin-bottom:20px}
label{display:block;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#767668;margin-bottom:7px}
input[type=tel],input[type=password]{width:100%;background:#F8F8F4;border:2px solid #E0E0D8;border-radius:8px;padding:14px 15px;font-family:'Barlow',sans-serif;font-size:17px;font-weight:500;color:#1A1A14;outline:none;transition:border-color .2s;-webkit-appearance:none}
input:focus{border-color:#003D2B}
input::placeholder{color:#AAAAAA}
.fg{margin-bottom:16px}
.btn{width:100%;padding:15px;border-radius:8px;border:none;cursor:pointer;font-family:'Barlow',sans-serif;font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;transition:all .15s;display:block;text-align:center}
.btn:active{transform:scale(.97)}
.btn-primary{background:#003D2B;color:#F5E030}
.btn-primary:disabled{background:#ccc;color:#888;cursor:not-allowed}
.btn-secondary{background:transparent;border:2px solid #E0E0D8;color:#767668;margin-top:10px;text-decoration:none}
.btn-secondary:hover{border-color:#003D2B;color:#003D2B}
.err{color:#DC2626;font-size:13px;font-weight:600;text-align:center;margin-bottom:12px;display:none;background:rgba(220,38,38,.06);padding:10px;border-radius:8px;border:1px solid rgba(220,38,38,.2)}
.pin-hint{font-size:12px;color:#767668;text-align:center;margin-top:8px;display:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-section">
    <img id="salonLogoImg" class="salon-logo-img" src="ms-default-logo.svg" alt="Salon Logo"
         onerror="this.src='ms-default-logo.svg'">
    <span id="platformTag" class="platform-tag">Digital Salon Platform</span>
    <span class="salon-name-tag ms-salon-name">Loading…</span>
  </div>
  <div class="card">
    <div class="role-banner">
      <span class="role-icon">👤</span>
      <div><span class="role-title">Customer Portal</span><span class="role-sub">Style cards, loyalty &amp; referrals</span></div>
    </div>
    <h2>Customer Portal</h2>
    <p class="sub">Enter your phone number and 6-digit PIN</p>
    <div id="errMsg" class="err"></div>
    <div class="fg"><label>Mobile Number</label><input type="tel" id="phoneInput" placeholder="10-digit mobile number" maxlength="10" oninput="this.value=this.value.replace(/\D/g,'');hideErr()"></div>
    <div class="fg"><label>PIN</label><input type="password" id="pinInput" placeholder="6-digit PIN" maxlength="6" inputmode="numeric" oninput="this.value=this.value.replace(/\D/g,'');hideErr()"></div>
    <div id="pinHint" class="pin-hint"></div>
    <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Login →</button>
    <a href="#" onclick="goPortal()" class="btn btn-secondary">← Back to Portals</a>
  </div>
</div>
<script>
var MS_URL = 'https://sgliztuggyksdemzkaxr.supabase.co';
var MS_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNnbGl6dHVnZ3lrc2RlbXprYXhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODc5MjMsImV4cCI6MjA5Mzg2MzkyM30.RE6j94oiI2ycLO0qj9WpYdn9Vg_5bF5jG6PQoP3huQk';
var _slug = new URLSearchParams(location.search).get('salon') 
          || sessionStorage.getItem('ms_slug')
          || localStorage.getItem('ms_slug') 
          || '';
// If no slug in URL, redirect to index
if(!_slug){
  var _stored = localStorage.getItem('ms_slug') || '';
  if(_stored) window.location.href = 'login-customer.html?salon='+encodeURIComponent(_stored);
}
var _tenant = null;

function _h(){ return {'Content-Type':'application/json','apikey':MS_KEY,'Authorization':'Bearer '+MS_KEY}; }
function _get(p){ return fetch(MS_URL+'/rest/v1/'+p,{headers:_h()}).then(function(r){return r.json();}); }
function _patch(p,b){ return fetch(MS_URL+'/rest/v1/'+p,{method:'PATCH',headers:_h(),body:JSON.stringify(b)}).then(function(r){return r.json();}); }

// Normalize phone to last 10 digits
function _norm(p){ var s=String(p||'').replace(/\D/g,''); return s.length>10?s.slice(-10):s; }

// Deterministic PIN from phone
function _genPin(phone){
  var p=_norm(phone);
  if(p.length<6) return '';
  var seed=parseInt(p.slice(-6));
  return String((seed*7919+31337)%900000+100000);
}

// Load tenant on init
(function init(){
  if(!_slug){ 
    showErr('No salon ID. Please use your salon portal link: salon-portal.html?salon=YOUR-SALON'); 
    document.getElementById('loginBtn').disabled=true;
    return; 
  }
  sessionStorage.setItem('ms_slug',_slug);
  localStorage.setItem('ms_slug',_slug);
  document.getElementById('loginBtn').disabled=true;
  document.getElementById('loginBtn').textContent='⏳ Loading…';
  _get('tenants?slug=eq.'+encodeURIComponent(_slug)+'&is_active=eq.true&select=id,name,logo_url,plan')
    .then(function(rows){
      if(!rows||rows.code||!rows.length){showErr('Salon not found: '+_slug);return;}
      _tenant=rows[0];
      // Apply branding
      var img=document.getElementById('salonLogoImg');
      if(_tenant.logo_url){
        img.onload=function(){document.getElementById('platformTag').style.display='none';};
        img.onerror=function(){img.src='ms-default-logo.svg';};
        img.src=_tenant.logo_url;
      }
      document.querySelectorAll('.ms-salon-name').forEach(function(el){el.textContent=_tenant.name;});
      document.title=_tenant.name+' – Customer Portal';
      sessionStorage.setItem('ms_tenant_id',_tenant.id);
      localStorage.setItem('ms_tenant_id',_tenant.id);
      localStorage.setItem('ms_plan',_tenant.plan||'free');
      localStorage.setItem('ms_name',_tenant.name);
      localStorage.setItem('ms_logo',_tenant.logo_url||'');
      document.getElementById('loginBtn').disabled=false;
      document.getElementById('loginBtn').textContent='Login →';
    }).catch(function(e){showErr('Load failed: '+e.message);document.getElementById('loginBtn').disabled=false;document.getElementById('loginBtn').textContent='Login →';});
})();

function doLogin(){
  var rawPhone=document.getElementById('phoneInput').value.trim();
  var pin=document.getElementById('pinInput').value.trim();
  hideErr();
  var phone=_norm(rawPhone);
  if(phone.length<10){showErr('Enter a valid 10-digit phone number.');return;}
  if(pin.length<6){showErr('Enter your 6-digit PIN.');return;}
  if(!_tenant){showErr('Salon not loaded. Please refresh.');return;}

  var btn=document.getElementById('loginBtn');
  btn.disabled=true; btn.textContent='Checking…';

  // Direct fetch with exact phone + tenant_id
  var _directUrl = MS_URL+'/rest/v1/customers?tenant_id=eq.'+encodeURIComponent(_tenant.id)+'&phone=eq.'+encodeURIComponent(phone)+'&select=id,name,phone,login_pin,loginPin,tenant_id,loyalty_points,cashback_credit,referral_code&limit=5';
  console.log('[MySalon] Customer fetch URL:', _directUrl);
  fetch(_directUrl, {headers:_h()})
  .then(function(r){return r.json();})
  .then(function(rows){
    console.log('[MySalon] Customer rows:', JSON.stringify(rows));
    // If RLS blocked it (empty array), try without tenant filter
    if(!rows || !Array.isArray(rows) || rows.length === 0){
      return fetch(MS_URL+'/rest/v1/customers?phone=eq.'+encodeURIComponent(phone)+'&select=id,name,phone,login_pin,loginPin,tenant_id,loyalty_points,cashback_credit,referral_code&limit=5',
        {headers:_h()}).then(function(r){return r.json();});
    }
    return rows;
  }).then(function(rows){
    console.log('[MySalon] Customer rows (after fallback):', JSON.stringify(rows));
    console.log('[MySalon] Customer rows by phone:', JSON.stringify(rows));

    if(!rows||rows.code){
      showErr('DB error: '+(rows?rows.message:'unknown'));
      btn.disabled=false; btn.textContent='Login →';
      return;
    }

    // Filter to this tenant
    var match=null;
    if(Array.isArray(rows)){
      match=rows.find(function(r){return String(r.tenant_id)===String(_tenant.id);});
      if(!match && rows.length>0) match=rows[0]; // fallback: first match
    }

    if(!match){
      // Customer not in DB — show their auto-PIN so they can use it
      var autoPin=_genPin(phone);
      showErr('Phone not registered yet. Your PIN will be: '+autoPin+' — ask your salon to add a billing entry with your number first.');
      btn.disabled=false; btn.textContent='Login →';
      return;
    }

    // Get stored PIN
    var storedPin=String(match.login_pin||match.loginPin||'').trim();
    console.log('[MySalon] Stored PIN:', storedPin, '| Entered PIN:', pin);

    // If no PIN in DB, generate and save it
    if(!storedPin || storedPin.length<4){
      storedPin=_genPin(phone);
      // Save to Supabase
      _patch('customers?id=eq.'+encodeURIComponent(match.id), {login_pin:storedPin, loginPin:storedPin})
        .then(function(){ console.log('[MySalon] PIN saved:', storedPin); })
        .catch(function(e){ console.warn('[MySalon] PIN save failed:', e); });
      // Show hint
      var hint=document.getElementById('pinHint');
      hint.textContent='Your PIN has been set to: '+storedPin;
      hint.style.display='block';
    }

    if(storedPin!==pin){
      showErr('Wrong PIN. Your PIN is: '+storedPin.slice(0,1)+'•••••');
      document.getElementById('pinInput').value='';
      btn.disabled=false; btn.textContent='Login →';
      return;
    }

    // ── Login success ──────────────────────────────────────────
    var sessData={
      ms_role:'customer',
      ms_phone:phone,
      ms_user_name:match.name||'Customer',
      ms_customer_id:String(match.id),
      ms_staff_id:String(match.id),
      ms_slug:_slug,
      ms_tenant_id:_tenant.id,
      ms_plan:_tenant.plan||'free',
      ms_name:_tenant.name,
      ms_logo:_tenant.logo_url||''
    };
    Object.keys(sessData).forEach(function(k){
      try{sessionStorage.setItem(k,sessData[k]);}catch(e){}
      try{localStorage.setItem(k,sessData[k]);}catch(e){}
    });
    sessionStorage.setItem('ms_loyalty',match.loyalty_points||0);
    sessionStorage.setItem('ms_cashback',match.cashback_credit||0);
    sessionStorage.setItem('ms_referral_code',match.referral_code||'');

    btn.textContent='✅ Logging in…';
    // Unregister old /BB/ service workers before navigating
    if('serviceWorker' in navigator){
      navigator.serviceWorker.getRegistrations().then(function(regs){
        regs.forEach(function(r){if(r.scope.indexOf('/BB/')!==-1){r.unregister();}});
      });
    }
    setTimeout(function(){
      window.location.href='app-customer.html?salon='+encodeURIComponent(_slug);
    },400);
  }).catch(function(e){
    showErr('Login error: '+e.message);
    btn.disabled=false; btn.textContent='Login →';
  });
}

function showErr(m){var e=document.getElementById('errMsg');e.textContent=m;e.style.display='block';}
function hideErr(){document.getElementById('errMsg').style.display='none';}
function goPortal(){var s=_slug||localStorage.getItem('ms_slug')||'';window.location.href='salon-portal.html'+(s?'?salon='+encodeURIComponent(s):'');}
document.addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
