<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>MySalon – Customer Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:#F0F0EA;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px}
.card{background:white;border-radius:16px;padding:32px 24px;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(0,0,0,.10);border:1px solid #E0E0D8}
.logo-wrap{text-align:center;margin-bottom:24px}
.ms-logo-mark{display:inline-block;background:#003D2B;border-radius:10px;overflow:hidden;border:3px solid #C8A800}
.ms-logo-top{display:block;background:#C8A800;font-family:'Bebas Neue',sans-serif;font-size:32px;color:#003D2B;letter-spacing:2px;line-height:1;padding:6px 22px 2px;text-align:center}
.ms-logo-bot{display:block;background:#003D2B;font-family:'Bebas Neue',sans-serif;font-size:18px;color:#C8A800;letter-spacing:3px;line-height:1;padding:2px 22px 6px;text-align:center}
.ms-logo-tag{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:#555;margin-top:8px;display:block}
.salon-name-display{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;color:#003D2B;letter-spacing:1px;text-transform:uppercase;margin-top:6px;display:block}
.role-banner{background:#003D2B;color:#F5E030;border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:24px}
.role-icon{font-size:26px}
.role-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;display:block}
.role-sub{font-size:11px;color:rgba(245,224,48,.6);margin-top:2px;display:block}
h2{font-size:22px;font-weight:800;color:#1A1A14;margin-bottom:4px}
.sub{font-size:13px;color:#767668;margin-bottom:22px}
label{display:block;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#767668;margin-bottom:8px}
input[type=tel],input[type=password]{width:100%;background:#F8F8F4;border:2px solid #E0E0D8;border-radius:8px;padding:14px 15px;font-family:'Barlow',sans-serif;font-size:17px;font-weight:500;color:#1A1A14;outline:none;transition:border-color .2s;-webkit-appearance:none}
input:focus{border-color:#004F38}
input::placeholder{color:#AAAAAA}
.fg{margin-bottom:18px}
.btn{width:100%;padding:15px;border-radius:8px;border:none;cursor:pointer;font-family:'Barlow',sans-serif;font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;transition:all .15s;display:block;text-align:center;text-decoration:none}
.btn:active{transform:scale(.97)}
.btn-primary{background:#003D2B;color:#F5E030}
.btn-primary:disabled{background:#ccc;color:#888;cursor:not-allowed}
.btn-secondary{background:transparent;border:2px solid #E0E0D8;color:#767668;margin-top:10px}
.btn-secondary:hover{border-color:#004F38;color:#004F38}
.err{color:#DC2626;font-size:13px;font-weight:600;text-align:center;margin-bottom:12px;display:none;background:rgba(220,38,38,.06);padding:10px;border-radius:8px;border:1px solid rgba(220,38,38,.2)}
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <div class="ms-logo-mark">
      <span class="ms-logo-top">MY</span>
      <span class="ms-logo-bot">SALON</span>
    </div>
    <span class="ms-logo-tag">Digital Salon Platform</span>
    <span class="salon-name-display ms-salon-name">Loading…</span>
  </div>
  <div class="role-banner">
    <span class="role-icon">👤</span>
    <div><span class="role-title">Customer Portal</span><span class="role-sub">Style cards, loyalty &amp; referrals</span></div>
  </div>
  <h2>Customer Portal</h2>
  <p class="sub">Enter your phone number and 6-digit PIN</p>
  <div id="errMsg" class="err"></div>
  <div class="fg"><label>Mobile Number</label><input type="tel" id="phoneInput" placeholder="10-digit mobile number" maxlength="10" oninput="this.value=this.value.replace(/\D/g,'')"></div>
  <div class="fg"><label>PIN</label><input type="password" id="pinInput" placeholder="6-digit PIN" maxlength="6" inputmode="numeric" oninput="this.value=this.value.replace(/\D/g,'')"></div>
  <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Login →</button>
  <a href="index.html" class="btn btn-secondary">← Back to MySalon</a>
</div>
<script>
var MS_URL='https://sgliztuggyksdemzkaxr.supabase.co';
var MS_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNnbGl6dHVnZ3lrc2RlbXprYXhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODc5MjMsImV4cCI6MjA5Mzg2MzkyM30.RE6j94oiI2ycLO0qj9WpYdn9Vg_5bF5jG6PQoP3huQk';
var _slug=new URLSearchParams(location.search).get('salon')||sessionStorage.getItem('ms_slug')||'';
var _tenant=null;
function _h(){return{'Content-Type':'application/json','apikey':MS_KEY,'Authorization':'Bearer '+MS_KEY};}
function _get(p){return fetch(MS_URL+'/rest/v1/'+p,{headers:_h()}).then(function(r){return r.ok?r.json():[];});}
function _post(p,b){return fetch(MS_URL+'/rest/v1/'+p,{method:'POST',headers:Object.assign(_h(),{'Prefer':'return=representation'}),body:JSON.stringify(b)}).then(function(r){return r.ok?r.json():r.text().then(function(t){throw new Error(t);});}).then(function(r){return Array.isArray(r)?r[0]:r;});}
(function init(){
  if(!_slug){showErr('No salon ID.');return;}
  sessionStorage.setItem('ms_slug',_slug);
  document.getElementById('loginBtn').disabled=true;
  document.getElementById('loginBtn').textContent='⏳ Loading…';
  _get('tenants?slug=eq.'+encodeURIComponent(_slug)+'&is_active=eq.true&select=id,name,logo_url,plan,owner_phone,owner_pin')
    .then(function(rows){
      if(!rows||!rows.length){showErr('Salon not found.');return;}
      _tenant=rows[0];
      document.querySelectorAll('.ms-salon-name').forEach(function(el){el.textContent=_tenant.name;});
      document.title=_tenant.name+' – Customer Portal';
      sessionStorage.setItem('ms_tenant_id',_tenant.id);
      sessionStorage.setItem('ms_plan',_tenant.plan||'free');
      sessionStorage.setItem('ms_name',_tenant.name);
      document.getElementById('loginBtn').disabled=false;
      document.getElementById('loginBtn').textContent='Login →';
    }).catch(function(){showErr('Failed to load.');document.getElementById('loginBtn').disabled=false;document.getElementById('loginBtn').textContent='Login →';});
})();
function doLogin(){
  var phone=document.getElementById('phoneInput').value.trim();
  var pin=document.getElementById('pinInput').value.trim();
  hideErr();
  if(phone.length<10){showErr('Enter valid 10-digit phone.');return;}
  if(pin.length<6){showErr('Enter your 6-digit PIN.');return;}
  if(!_tenant){showErr('Salon data not loaded.');return;}
  _get('customers?tenant_id=eq.'+encodeURIComponent(_tenant.id)+'&phone=eq.'+encodeURIComponent(phone)+'&select=id,name,login_pin,loginPin,loyalty_points,referral_code')
    .then(function(rows){
      if(!rows||!rows.length){showErr('Phone not registered. Please sign up first.');return;}
      var c=rows[0];var lp=String(c.loginPin||c.login_pin||'');
      if(lp!==pin){showErr('Wrong PIN.');document.getElementById('pinInput').value='';return;}
      setSession('customer',phone,c.name||'Customer',String(c.id),'');
      sessionStorage.setItem('ms_loyalty',c.loyalty_points||0);
      sessionStorage.setItem('ms_referral_code',c.referral_code||'');
      try{localStorage.setItem('ms_role',role||'customer');localStorage.setItem('ms_phone',phone);localStorage.setItem('ms_slug',_slug);localStorage.setItem('ms_tenant_id',_tenant?_tenant.id:'');}catch(e){}
window.location.href='app-customer.html?salon='+encodeURIComponent(_slug);
    }).catch(function(){showErr('Login failed.');});
}
function setSession(role,phone,name,staffId,salonId){
  sessionStorage.setItem('ms_role',role);
  sessionStorage.setItem('ms_phone',phone);
  sessionStorage.setItem('ms_user_name',name||role);
  if(staffId)sessionStorage.setItem('ms_staff_id',staffId);
  if(salonId)sessionStorage.setItem('ms_salon_id',salonId);
}
function showErr(m){var e=document.getElementById('errMsg');e.textContent=m;e.style.display='block';}
function hideErr(){document.getElementById('errMsg').style.display='none';}
document.addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
